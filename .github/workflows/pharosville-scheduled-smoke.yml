name: PharosVille scheduled live smoke

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  smoke-live:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pharosville-scheduled-smoke
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node24-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node24-modules-
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Live smoke check
        env:
          SMOKE_UI_URL: https://pharosville.pharos.watch
          SMOKE_TIMEOUT_MS: 15000
        run: npm run smoke:live -- --url "$SMOKE_UI_URL" --timeout-ms "$SMOKE_TIMEOUT_MS"
      - name: Open incident on scheduled smoke failure
        if: failure()
        env:
          SMOKE_UI_URL: https://pharosville.pharos.watch
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          WORKFLOW_RUN="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ISSUE_TITLE="PharosVille scheduled smoke regression"
          ISSUE_BODY=$(cat <<BODY
Automated scheduled smoke regression detected.

- Job run: ${WORKFLOW_RUN}
- URL checked: ${SMOKE_UI_URL}
- Branch: ${{ github.ref_name }}

Please rerun:
`npm run smoke:live -- --url ${SMOKE_UI_URL}`
and
`npm run check:security-headers`
          BODY
)

          gh label create pharosville-smoke-alert \
            --color "B60205" \
            --description "Automated PharosVille smoke regressions requiring operational follow-up" \
            --repo "${{ github.repository }}" || true

          EXISTING=$(gh issue list --state open --label pharosville-smoke-alert --json number --jq 'length')
          if [ "$EXISTING" = "0" ]; then
            gh issue create \
              --title "$ISSUE_TITLE" \
              --label pharosville-smoke-alert \
              --body "$ISSUE_BODY"
          else
            gh issue create \
              --title "${ISSUE_TITLE} ($(date -u +%F-%H%M))" \
              --label pharosville-smoke-alert \
              --body "$ISSUE_BODY"
          fi
