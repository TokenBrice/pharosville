name: Deploy to Cloudflare Pages

# Visual policy: pull requests and main pushes must pass built-dist Playwright lanes
# (single-browser and cross-browser accessibility) before release gating.
on:
  pull_request:
  push:
    branches:
      - main

env:
  # Opt JS actions (cache, setup-node, etc.) into Node 24 ahead of the
  # September 2026 Node 20 removal. Remove once GitHub flips the default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-typecheck-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node24-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node24-modules-
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Typecheck
        run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-unit-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node24-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node24-modules-
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Unit and contract tests
        run: npm test

  guards:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-guards-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node24-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node24-modules-
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Guard script self-tests
        run: npm run test:guard-scripts
      - name: Secret scan
        run: npm run check:committed-secrets
      - name: Documentation path and script guard
        run: npm run check:doc-paths-and-scripts
      - name: Asset manifest guard
        run: npm run check:pharosville-assets
      - name: Palette guard
        run: npm run check:pharosville-colors

  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-build-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node24-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node24-modules-
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Build
        run: npm run build
      - name: Bundle size guard
        run: npm run check:bundle-size
      - uses: actions/upload-artifact@v4
        with:
          name: pharosville-dist
          path: dist

  visual:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-visual-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node24-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node24-modules-
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: pharosville-dist
          path: dist
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}
      - run: npx --no-install playwright install --with-deps chromium
      - name: Built-dist visual tests
        run: npm run test:visual:dist
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pharosville-visual-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

  visual-cross-browser:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-visual-cross-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node24-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node24-modules-
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: pharosville-dist
          path: dist
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}-chromium-firefox
          restore-keys: |
            ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-ms-playwright-
      - run: npx --no-install playwright install --with-deps chromium firefox
      - name: Built-dist cross-browser accessibility smoke
        run: npm run test:visual:dist:accessibility
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pharosville-visual-cross-browser-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - typecheck
      - unit
      - guards
      - build
      - visual
      - visual-cross-browser
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node24-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node24-modules-
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: pharosville-dist
          path: dist
      - name: Deploy Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --no-install wrangler pages deploy dist --project-name=pharosville --commit-message="$GITHUB_SHA"
      - name: Smoke live
        env:
          SMOKE_UI_URL: ${{ vars.SMOKE_UI_URL || 'https://pharosville.pharos.watch' }}
        run: npm run smoke:live -- --url "$SMOKE_UI_URL"

  release-readiness:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-readiness-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node24-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node24-modules-
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}-release
          restore-keys: |
            ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-ms-playwright-
      - run: npx --no-install playwright install --with-deps chromium firefox
      - name: Release-readiness gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run check:release-readiness
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pharosville-release-readiness-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
