name: Deploy to Cloudflare Pages

# Visual policy: pull requests and main pushes must pass built-dist Playwright lanes
# (single-browser and cross-browser accessibility) before release gating.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-typecheck-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-workspace
      - name: Typecheck
        run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-unit-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-workspace
      - name: Unit and contract tests
        run: npm test

  guards:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-guards-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-workspace
      - name: Guard script self-tests
        run: npm run test:guard-scripts
      - name: Secret scan
        run: npm run check:committed-secrets
      - name: Documentation path and script guard
        run: npm run check:doc-paths-and-scripts
      - name: Runtime facts guard
        run: npm run check:runtime-facts
      - name: Viewport gate guard
        run: npm run check:viewport-gate
      - name: Static security headers guard
        run: npm run check:security-headers:static
      - name: Asset manifest guard
        run: npm run check:pharosville-assets
      - name: Palette guard
        run: npm run check:pharosville-colors

  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-build-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-workspace
      - name: Build
        run: npm run build
      - name: Bundle size guard
        run: npm run check:bundle-size
      - uses: actions/upload-artifact@v7
        with:
          name: pharosville-dist
          path: dist

  visual:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    concurrency:
      group: ${{ github.workflow }}-visual-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-workspace
      - uses: actions/download-artifact@v7
        with:
          name: pharosville-dist
          path: dist
      - name: Built-dist visual tests
        run: npm run test:visual:dist
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: pharosville-visual-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

  visual-cross-browser:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    # Firefox refuses to launch when $HOME isn't owned by the running user.
    # The playwright container runs as root, but GH Actions injects
    # HOME=/github/home (owned by uid 1000 on the host). Pin HOME to a
    # root-owned path so Firefox's sandbox check passes.
    env:
      HOME: /root
    concurrency:
      group: ${{ github.workflow }}-visual-cross-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-workspace
      - uses: actions/download-artifact@v7
        with:
          name: pharosville-dist
          path: dist
      - name: Built-dist cross-browser accessibility smoke
        run: npm run test:visual:dist:accessibility:firefox
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: pharosville-visual-cross-browser-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - typecheck
      - unit
      - guards
      - build
      - visual
      - visual-cross-browser
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-workspace
      - uses: actions/download-artifact@v7
        with:
          name: pharosville-dist
          path: dist
      - name: Deploy Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            echo "Cloudflare Pages deploy attempt ${attempt}/3"
            if npx --no-install wrangler pages deploy dist --project-name=pharosville --commit-message="$GITHUB_SHA"; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((attempt * 30))
              echo "Cloudflare Pages deploy failed; retrying in ${sleep_seconds}s."
              sleep "$sleep_seconds"
            fi
          done

          echo "Cloudflare Pages deploy failed after 3 attempts."
          exit 1
      - name: Upload Wrangler deploy logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: wrangler-deploy-logs
          path: ~/.config/.wrangler/logs
          if-no-files-found: ignore
      - name: Check live security headers
        env:
          SMOKE_UI_URL: ${{ vars.SMOKE_UI_URL || 'https://pharosville.pharos.watch' }}
        run: node scripts/pharosville/check-security-headers.mjs --url "$SMOKE_UI_URL"
      - name: Smoke live
        env:
          SMOKE_UI_URL: ${{ vars.SMOKE_UI_URL || 'https://pharosville.pharos.watch' }}
        run: npm run smoke:live -- --url "$SMOKE_UI_URL"
