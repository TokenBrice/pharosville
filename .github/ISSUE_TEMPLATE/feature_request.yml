name: Feature Request
description: Propose a PharosVille improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What user need or workflow would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: semantics
    attributes:
      label: Does this change visual or data semantics?
      options:
        - "No"
        - "Yes"
        - Not sure
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation or acceptance ideas
      description: What would prove the feature works?
  - type: textarea
    id: context
    attributes:
      label: Additional context
