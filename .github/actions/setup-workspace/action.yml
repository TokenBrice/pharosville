name: Setup Workspace
description: Shared Node, npm cache, and dependency install setup for PharosVille jobs.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "24"
  install-deps:
    description: Whether to run npm ci after Node setup.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: package-lock.json

    - uses: actions/cache@v5
      id: node-modules
      with:
        path: node_modules
        key: ${{ runner.os }}-${{ runner.arch }}-node${{ inputs.node-version }}-modules-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-node${{ inputs.node-version }}-modules-

    - if: ${{ inputs.install-deps == 'true' && steps.node-modules.outputs.cache-hit != 'true' }}
      shell: bash
      run: npm ci
